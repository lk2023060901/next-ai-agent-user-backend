services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      GRPC_ADDR: service:50051
      BIFROST_ADDR: http://bifrost:8081
      RUNTIME_ADDR: http://runtime:8082
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      RUNTIME_SECRET: ${RUNTIME_SECRET:?RUNTIME_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GO_ENV: production
    depends_on:
      service:
        condition: service_healthy
    restart: unless-stopped

  service:
    build:
      context: .
      dockerfile: service/Dockerfile
    ports:
      - "50051:50051"
      - "3001:3001"
    volumes:
      - app-data:/app/data
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      RUNTIME_SECRET: ${RUNTIME_SECRET:?RUNTIME_SECRET is required}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:?ENCRYPTION_SECRET is required}
      DB_PATH: /app/data/app.db
      RUNTIME_ADDR: http://runtime:8082
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  runtime:
    build:
      context: .
      dockerfile: runtime/Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - app-data:/app/data
    environment:
      GRPC_ADDR: service:50051
      GATEWAY_ADDR: http://gateway:8080
      RUNTIME_SECRET: ${RUNTIME_SECRET:?RUNTIME_SECRET is required}
      DB_PATH: /app/data/runtime.db
      RUNTIME_HOST: "0.0.0.0"
      NODE_ENV: production
    depends_on:
      service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
