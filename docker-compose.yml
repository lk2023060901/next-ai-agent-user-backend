services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - runtime
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://nextai:nextai@postgres:5432/nextai?sslmode=disable
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - PORT=3001
      - WORKFLOW_OUTPUT_STORAGE_ENDPOINT=minio:9000
      - WORKFLOW_OUTPUT_STORAGE_ACCESS_KEY=minioadmin
      - WORKFLOW_OUTPUT_STORAGE_SECRET_KEY=minioadmin
      - WORKFLOW_OUTPUT_STORAGE_BUCKET=workflow-outputs
      - WORKFLOW_OUTPUT_STORAGE_REGION=us-east-1
      - WORKFLOW_OUTPUT_STORAGE_USE_SSL=false
      - WORKFLOW_OUTPUT_STORAGE_AUTO_CREATE_BUCKET=true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  runtime:
    build:
      context: ./runtime
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://nextai:nextai@postgres:5432/nextai?sslmode=disable
      - MILVUS_ADDRESS=milvus:19530
      - PORT=3002
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nextai
      POSTGRES_PASSWORD: nextai
      POSTGRES_DB: nextai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcddata:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - miniodata:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  etcddata:
  miniodata:
  milvusdata:
